name: OWASP ZAP Security Scan

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  zap-security-scan:
    name: DAST OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Iniciar aplicacao vulneravel
        run: |
          echo "Subindo TechShop em background..."

          python app/server.py &
          echo $! > /tmp/server.pid

          echo "Aguardando aplicacao responder..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Aplicacao no ar apos ${i}s!"
              break
            fi

            sleep 1

            if [ $i -eq 30 ]; then
              echo "Timeout: aplicacao nao respondeu em 30s"
              exit 1
            fi
          done

          curl -sf "http://localhost:8080/login?username=test&password=test" > /dev/null \
            && echo "Rota /login OK" \
            || echo "Rota /login nao respondeu"

      - name: Preparar pasta dos relatorios
        run: |
          mkdir -p zap-output
          chmod 777 zap-output
          ls -la

      - name: Executar OWASP ZAP Baseline Scan via Docker
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable

          docker run --rm \
            --user root \
            --network=host \
            -v "${{ github.workspace }}/zap-output:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8080 \
              -J zap-report.json \
              -w zap-report.md \
              -r zap-report.html \
              -l INFO \
              -T 5 || true

          echo "Arquivos gerados dentro de zap-output:"
          ls -la zap-output

      - name: Validar se o relatorio foi gerado
        run: |
          echo "Validando relatorio JSON..."

          if [ ! -f zap-output/zap-report.json ]; then
            echo "ERRO: zap-output/zap-report.json nao foi encontrado."
            echo "Conteudo da pasta zap-output:"
            ls -la zap-output
            exit 1
          fi

          echo "Relatorio encontrado com sucesso."

      - name: Analisar relatorio ZAP
        run: |
          echo "Analisando severidades do relatorio ZAP"

          python analise_relatorio.py zap-output/zap-report.json

          if [ -f analise_zap.txt ]; then
            cp analise_zap.txt zap-output/analise_zap.txt
          fi

      - name: Verificar vulnerabilidades altas ou criticas
        run: |
          python3 << 'PYEOF'
          import json
          import sys

          report_path = "zap-output/zap-report.json"

          with open(report_path, encoding="utf-8") as f:
              data = json.load(f)

          alerts = []
          for site in data.get("site", []):
              alerts.extend(site.get("alerts", []))

          high = 0
          critical = 0

          for alert in alerts:
              riskcode = str(alert.get("riskcode", "0"))
              riskdesc = str(alert.get("riskdesc", "")).lower()

              if riskcode == "3":
                  high += 1

              if "critical" in riskdesc:
                  critical += 1

          print(f"High: {high}")
          print(f"Critical: {critical}")

          if high > 0 or critical > 0:
              print("Pipeline falhou: vulnerabilidade Alta ou Critica encontrada.")
              sys.exit(1)

          print("Nenhuma vulnerabilidade Alta ou Critica encontrada.")
          PYEOF

      - name: Upload dos relatorios como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zapreport
          path: zap-output/
          if-no-files-found: warn

      - name: Encerrar servidor
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid)
            echo "Servidor encerrado."
          fi