name: 🛡️ DAST — OWASP ZAP Baseline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🚀 Subir aplicação (TechShop)
        run: |
          echo "──────────────────────────────────────────"
          echo "  Subindo TechShop em background..."
          echo "──────────────────────────────────────────"

          cd app
          python3 -m http.server 8080 &
          echo $! > /tmp/server.pid
          cd ..

          echo "Aguardando aplicação responder..."
          sleep 2

          curl -s http://localhost:8080 > /dev/null && echo "✅ Aplicação no ar!"

      - name: 🔍 Executar OWASP ZAP Baseline Scan
        id: zap_scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
          allow_issue_writing: false
          cmd_options: >-
            -r zap-report.html
            -J zap-report.json
            -x zap-report.xml
            -w zap-report.md
            -l INFO
            -z "-config scanner.threadPerHost=5"

      - name: 📊 Analisar severidades do relatório
        run: |
          echo "──────────────────────────────────────────"
          echo "  Analisando severidades do relatório ZAP"
          echo "──────────────────────────────────────────"

          if [ ! -f zap-report.json ]; then
            echo "⚠️ zap-report.json não encontrado — ZAP falhou"
            exit 1
          fi

          HIGH=$(jq '[.site[].alerts[] | select(.riskdesc | contains("High"))] | length' zap-report.json)
          CRITICAL=$(jq '[.site[].alerts[] | select(.riskdesc | contains("Critical"))] | length' zap-report.json)

          echo "🔴 High: $HIGH"
          echo "🚨 Critical: $CRITICAL"

          if [ "$HIGH" -gt 0 ] || [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Pipeline falhou por vulnerabilidades críticas!"
            exit 1
          else
            echo "✅ Nenhuma vulnerabilidade crítica encontrada"
          fi

      - name: 📦 Upload do relatório como artefato
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json
            zap-report.xml
            zap-report.md

      - name: 🧹 Encerrar servidor
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid)
            echo "✅ Servidor encerrado."
          fi