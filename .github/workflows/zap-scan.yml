name: 🔐 OWASP ZAP Security Scan

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: zap-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zap-security-scan:
    name: 🛡️ DAST — OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      issues: write

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Iniciar aplicação vulnerável
        run: |
          echo "──────────────────────────────────────────"
          echo "  Subindo TechShop em background..."
          echo "──────────────────────────────────────────"

          python app/server.py &
          echo $! > /tmp/server.pid

          echo "Aguardando aplicação responder..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ Aplicação no ar após ${i}s!"
              break
            fi

            sleep 1

            if [ $i -eq 30 ]; then
              echo "❌ Timeout: aplicação não respondeu em 30s"
              exit 1
            fi
          done

          curl -sf "http://localhost:8080/login?username=test&password=test" > /dev/null \
            && echo "✅ Rota /login OK" \
            || echo "⚠️ Rota /login não respondeu"

      - name: 🔍 Executar OWASP ZAP Baseline Scan
        id: zap_scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
          allow_issue_writing: false
          cmd_options: >-
            -l INFO
            -T 5

      - name: 📁 Renomear relatórios ZAP
        if: always()
        run: |
          if [ -f report_html.html ]; then
            cp report_html.html zap-report.html
          fi

          if [ -f report_json.json ]; then
            cp report_json.json zap-report.json
          fi

          if [ -f report_md.md ]; then
            cp report_md.md zap-report.md
          fi

      - name: 🚨 Verificar vulnerabilidades altas/críticas
        if: always()
        run: |
          echo "──────────────────────────────────────────"
          echo "  Analisando severidades do relatório ZAP"
          echo "──────────────────────────────────────────"

          if [ ! -f zap-report.json ]; then
            echo "❌ zap-report.json não encontrado — ZAP falhou antes de gerar relatório."
            exit 1
          fi

          python3 << 'PYEOF'
          import json
          import sys

          with open("zap-report.json", encoding="utf-8") as f:
              data = json.load(f)

          alerts = []

          for site in data.get("site", []):
              alerts.extend(site.get("alerts", []))

          counts = {
              "High": 0,
              "Medium": 0,
              "Low": 0,
              "Informational": 0
          }

          common = {}

          for alert in alerts:
              risk = str(alert.get("riskcode", "0"))
              name = alert.get("name", "Desconhecido")

              if risk == "3":
                  counts["High"] += 1
              elif risk == "2":
                  counts["Medium"] += 1
              elif risk == "1":
                  counts["Low"] += 1
              else:
                  counts["Informational"] += 1

              common[name] = common.get(name, 0) + 1

          total = sum(counts.values())

          print(f"Total de alertas: {total}")
          print(f"High: {counts['High']}")
          print(f"Medium: {counts['Medium']}")
          print(f"Low: {counts['Low']}")
          print(f"Informational: {counts['Informational']}")

          print("\nVulnerabilidades mais comuns:")
          for name, qtd in sorted(common.items(), key=lambda x: x[1], reverse=True)[:5]:
              print(f"- {name}: {qtd}")

          if counts["High"] > 0:
              print("\n❌ Pipeline falhou: vulnerabilidade de severidade Alta encontrada.")
              sys.exit(1)

          print("\n✅ Nenhuma vulnerabilidade Alta encontrada.")
          PYEOF

      - name: 📦 Upload do relatório como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json
            zap-report.md
            report_html.html
            report_json.json
            report_md.md
          if-no-files-found: warn

      - name: 🧹 Encerrar servidor
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid)
            echo "✅ Servidor encerrado."
          fi