name: 🔐 OWASP ZAP Security Scan

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  zap-security-scan:
    name: DAST OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Iniciar aplicação vulnerável
        run: |
          echo "Subindo TechShop em background..."

          python app/server.py &
          echo $! > /tmp/server.pid

          echo "Aguardando aplicação responder..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Aplicação no ar após ${i}s!"
              break
            fi

            sleep 1

            if [ $i -eq 30 ]; then
              echo "Timeout: aplicação não respondeu em 30s"
              exit 1
            fi
          done

          curl -sf "http://localhost:8080/login?username=test&password=test" > /dev/null \
            && echo "Rota /login OK" \
            || echo "Rota /login não respondeu"

      - name: Executar OWASP ZAP Baseline Scan via Docker
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable

          docker run \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            -w /zap/wrk \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8080 \
              -J zap-report.json \
              -w zap-report.md \
              -r zap-report.html \
              -l INFO \
              -T 5 || true

          echo "Arquivos gerados:"
          ls -la

      - name: Analisar relatório ZAP
        run: |
          echo "Analisando severidades do relatório ZAP"

          if [ ! -f zap-report.json ]; then
            echo "zap-report.json não encontrado."
            exit 1
          fi

          python analise_relatorio.py zap-report.json

      - name: Verificar vulnerabilidades altas
        run: |
          python3 << 'PYEOF'
          import json
          import sys

          with open("zap-report.json", encoding="utf-8") as f:
              data = json.load(f)

          alerts = []
          for site in data.get("site", []):
              alerts.extend(site.get("alerts", []))

          high = 0
          critical = 0

          for alert in alerts:
              risk = str(alert.get("riskcode", "0"))

              if risk == "3":
                  high += 1

              riskdesc = str(alert.get("riskdesc", "")).lower()
              if "critical" in riskdesc:
                  critical += 1

          print(f"High: {high}")
          print(f"Critical: {critical}")

          if high > 0 or critical > 0:
              print("Pipeline falhou: vulnerabilidade Alta ou Crítica encontrada.")
              sys.exit(1)

          print("Nenhuma vulnerabilidade Alta ou Crítica encontrada.")
          PYEOF

      - name: Upload dos relatórios como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zapreport
          path: |
            zap-report.html
            zap-report.json
            zap-report.md
            analise_zap.txt
          if-no-files-found: warn

      - name: Encerrar servidor
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid)
            echo "Servidor encerrado."
          fi